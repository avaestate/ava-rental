<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>AVA Concierge · Variant 4 — Editorial / typographic</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/thin/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<style>
  :root{
    --ink:#2c3638; --slate:#515b5d; --muted:#8a9698; --accent:#624e40;
    --bg:#f3ece4; --white:#fff; --line:rgba(44,54,56,.10); --phone:430px;
    --serif:"Cormorant Garamond", Georgia, serif;
  }
  *{box-sizing:border-box}
  body{margin:0; font-family:"Manrope",system-ui,sans-serif; color:var(--ink);
    background:radial-gradient(120% 80% at 50% -10%,#faf4ee,transparent 60%),linear-gradient(180deg,#ece2d8,#e6dbcf);
    -webkit-font-smoothing:antialiased; line-height:1.5;}
  .stage{min-height:100dvh; display:flex; align-items:flex-start; justify-content:center; padding:30px 18px}
  .app{position:relative; width:100%; max-width:var(--phone); height:920px; background:var(--bg);
    border-radius:42px; box-shadow:0 50px 90px -30px rgba(44,54,56,.55),0 0 0 1px rgba(44,54,56,.06);
    overflow:hidden; display:flex; flex-direction:column;}

  .appbar{flex:0 0 auto; background:rgba(243,236,228,.85); -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line); padding:24px 24px 16px; display:flex; align-items:center; gap:13px;}
  .mark{width:40px; height:40px; border-radius:12px; flex:0 0 auto; background:var(--ink); display:grid; place-items:center}
  .mark svg{width:22px; height:22px}
  .brand .name{font-weight:600; font-size:15px; letter-spacing:.22em; color:var(--ink)}
  .brand .sub{font-size:9.5px; letter-spacing:.28em; text-transform:uppercase; color:var(--muted); margin-top:5px}

  .scroll{flex:1 1 auto; overflow-y:auto; padding:28px 24px 30px}
  .scroll::-webkit-scrollbar{width:0}

  .greeting{margin:6px 2px 30px; text-align:left}
  .greeting .hi{display:inline-flex; align-items:center; gap:9px; font-size:10.5px; letter-spacing:.26em;
    text-transform:uppercase; color:var(--accent); font-weight:600; margin-bottom:18px}
  .greeting .hi .dot{width:5px; height:5px; border-radius:50%; background:var(--accent)}
  .greeting h1{font-family:var(--serif); font-size:40px; line-height:1.06; font-weight:500; letter-spacing:0; margin:0; color:var(--ink)}
  .greeting h1 em{font-style:italic; font-weight:500; color:var(--accent)}

  .sec-label{display:flex; align-items:center; gap:14px; margin:30px 2px 6px}
  .sec-label .t{font-size:10.5px; letter-spacing:.26em; text-transform:uppercase; color:var(--muted); font-weight:600; white-space:nowrap}
  .sec-label .ln{flex:1; height:1px; background:var(--line)}
  .sec-label .c{font-size:10.5px; color:var(--muted); white-space:nowrap}

  /* featured: editorial wide card with serif title */
  #heroSlot{margin-top:18px}
  .tile.hero{display:flex; align-items:center; gap:20px; width:100%; cursor:pointer; text-align:left;
    background:var(--ink); color:var(--bg); border:0; border-radius:22px; padding:26px 24px; overflow:hidden;
    box-shadow:0 18px 40px -22px rgba(44,54,56,.5); position:relative; margin-bottom:6px;}
  .tile.hero::before{content:""; position:absolute; inset:0; background:radial-gradient(120% 120% at 100% 0%,rgba(98,78,64,.5),transparent 60%); opacity:.7}
  .tile.hero .ico{position:relative; font-size:54px; color:#e9ddca; line-height:1; flex:0 0 auto}
  .tile.hero .lab{position:relative}
  .tile.hero .lab .kicker{display:block; font-size:9px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:#cbb79f; margin-bottom:7px}
  .tile.hero .lab h3{font-family:var(--serif); font-size:28px; font-weight:500; color:#fff; line-height:1.05; margin:0}
  .tile.hero .lab .sub{display:block; font-size:12.5px; color:#cbd2d2; margin-top:8px; max-width:30ch; line-height:1.5}

  /* ===== EDITORIAL LIST — thin icon + serif label, hairline dividers, very restrained ===== */
  .svc-list{display:flex; flex-direction:column; margin-top:6px}
  .tile:not(.hero){display:flex; align-items:center; gap:18px; width:100%; cursor:pointer; text-align:left;
    background:transparent; border:0; border-bottom:1px solid var(--line); padding:18px 4px; transition:padding-left .3s, background .3s;}
  .tile:not(.hero):hover{padding-left:10px; background:rgba(255,255,255,.35); border-radius:12px; border-bottom-color:transparent}
  .tile:not(.hero) .ico{font-size:27px; color:var(--accent); line-height:1; flex:0 0 36px; text-align:center}
  .tile:not(.hero) .lab{flex:1; min-width:0}
  .tile:not(.hero) .lab h3{font-family:var(--serif); font-size:21px; font-weight:500; color:var(--ink); line-height:1.1; margin:0; letter-spacing:.01em}
  .tile:not(.hero) .lab .sub{display:block; font-size:12px; color:var(--muted); margin-top:2px; letter-spacing:.01em}
  .tile:not(.hero) .arrow{flex:0 0 auto; color:var(--muted); font-size:18px; opacity:.5}

  .note{text-align:center; color:var(--muted); font-size:11.5px; padding:24px 12px 4px; font-family:var(--serif); font-size:15px; font-style:italic}
  .cap{max-width:430px; text-align:center; margin:14px auto 0}
  .cap b{font-size:14px; font-weight:600; color:var(--ink)}
  .cap span{display:block; font-size:12.5px; color:var(--muted); margin-top:4px; line-height:1.5}
</style>
</head>
<body>
<div class="stage">
  <div>
    <div class="app">
      <header class="appbar">
        <span class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M3 16c2.2 0 2.2-2 4.4-2s2.2 2 4.4 2 2.2-2 4.4-2 2.2 2 4.4 2" stroke="#f0e7df" stroke-width="1.5" stroke-linecap="round"/><path d="M12 3.5l3 5.5H9l3-5.5z" stroke="#f0e7df" stroke-width="1.4" stroke-linejoin="round"/></svg></span>
        <div class="brand"><div class="name">AVA CONCIERGE</div><div class="sub">Koh Phangan</div></div>
      </header>
      <main class="scroll">
        <div class="greeting">
          <span class="hi"><span class="dot"></span> Welcome to AVA</span>
          <h1>Your villa <em>concierge</em>,<br/>at your fingertips.</h1>
        </div>
        <div id="heroSlot"></div>
        <div class="sec-label"><span class="t">Services</span><span class="ln"></span><span class="c" id="svcCount"></span></div>
        <div class="svc-list" id="svcGrid"></div>
        <div class="note">Quiet luxury — typography first, the icon merely a whisper.</div>
      </main>
    </div>
    <div class="cap"><b>4 · Editorial / typographic</b>
      <span>Thin Phosphor icon + Cormorant Garamond serif labels, hairline dividers. The most restrained, "expensive" look.</span></div>
  </div>
</div>
<script>window.AVA_VARIANT={weight:"thin", showSub:true};</script>
<script src="_shared.js"></script>
<script>
/* append a small arrow to each list row for editorial polish */
document.addEventListener("DOMContentLoaded", function(){
  setTimeout(function(){
    document.querySelectorAll("#svcGrid .tile:not(.hero)").forEach(function(t){
      var a=document.createElement("span"); a.className="arrow";
      a.innerHTML='<i class="ph-thin ph-arrow-right"></i>'; t.appendChild(a);
    });
  }, 30);
});
</script>
</body>
</html>
