<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>AVA Concierge · Icons8 3D Fluency (App Store dark tiles)</title>
<meta name="theme-color" content="#2c3638" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#2c3638; --ink-soft:#3f4a4c; --slate:#515b5d; --muted:#75878b; --accent:#624e40;
    --bg:#f0e7df; --cream-1:#f7f2ec; --cream-2:#f3ece5; --cream-3:#fcf5ef; --white:#fff;
    --line:rgba(44,54,56,.12);
    --shadow-sm:0 1px 2px rgba(44,54,56,.05), 0 2px 8px rgba(44,54,56,.05);
    --tile-shadow:0 14px 30px -16px rgba(44,54,56,.40), 0 3px 10px rgba(44,54,56,.08);
    --radius:20px; --ease:cubic-bezier(.2,.8,.2,1); --phone:430px; --nav-h:76px;
  }
  *{box-sizing:border-box}
  html{height:100%}
  body{margin:0; font-family:"Manrope",system-ui,-apple-system,sans-serif; color:var(--ink);
    background:radial-gradient(120% 80% at 50% -10%, #faf4ee, transparent 60%), linear-gradient(180deg,#ece2d8,#e6dbcf);
    -webkit-font-smoothing:antialiased; line-height:1.5; min-height:100%;}
  h1,h2,h3,h4{font-family:"Manrope",sans-serif; font-weight:400; letter-spacing:-.015em; color:var(--ink); margin:0}
  img{max-width:100%; display:block}

  .stage{min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:24px 16px}
  .app{position:relative; width:100%; max-width:var(--phone); height:min(900px, calc(100dvh - 48px));
    background:var(--bg); border-radius:42px; box-shadow:0 50px 90px -30px rgba(44,54,56,.55), 0 0 0 1px rgba(44,54,56,.06);
    overflow:hidden; display:flex; flex-direction:column; isolation:isolate;}

  .appbar{position:relative; z-index:30; flex:0 0 auto; backdrop-filter:saturate(120%) blur(14px);
    background:rgba(240,231,223,.82); border-bottom:1px solid var(--line);
    padding:18px 18px 14px; display:flex; align-items:center; gap:12px; min-height:60px;}
  .brand{display:flex; align-items:center; gap:11px; flex:1; min-width:0}
  .mark{width:38px;height:38px;border-radius:11px; flex:0 0 auto; background:var(--ink); display:grid;place-items:center; box-shadow:var(--shadow-sm)}
  .mark svg{width:21px;height:21px}
  .brand .name{font-weight:600; font-size:14.5px; letter-spacing:.2em; line-height:1; color:var(--ink)}
  .brand .sub{font-size:9.5px; letter-spacing:.26em; text-transform:uppercase; color:var(--muted); margin-top:5px}
  .vbadge{font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); background:var(--cream-3); border:1px solid var(--line); padding:5px 10px; border-radius:999px}

  .scroll{position:relative; z-index:10; flex:1 1 auto; overflow-y:auto; overflow-x:hidden}
  .scroll::-webkit-scrollbar{width:0}
  .view{padding:20px 16px calc(var(--nav-h) + 24px)}

  .greeting{margin:4px 4px 18px}
  .greeting .hi{display:inline-flex; align-items:center; gap:9px; font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); font-weight:600; margin-bottom:12px}
  .greeting .hi .dot{width:6px;height:6px;border-radius:50%; background:var(--accent); box-shadow:0 0 0 4px rgba(98,78,64,.14)}
  .greeting h1{font-size:28px; line-height:1.1; font-weight:300; letter-spacing:-.02em}
  .greeting h1 em{font-style:normal; font-weight:500; color:var(--accent)}

  .sec-label{display:flex; align-items:baseline; justify-content:space-between; margin:4px 6px 14px}
  .sec-label .t{font-size:11.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); font-weight:600}
  .sec-label .c{font-size:11.5px; color:var(--muted)}

  .tile-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:13px}
  .tile{position:relative; cursor:pointer; text-align:left; border:0; overflow:hidden;
    border-radius:24px; box-shadow:var(--tile-shadow); padding:0;
    transition:transform .38s var(--ease); display:block; aspect-ratio:1 / 1.18;}
  .tile.hero{grid-column:1 / -1; aspect-ratio:auto; min-height:172px}
  .tile::before{content:""; position:absolute; inset:0; background:
    radial-gradient(120% 80% at 85% 8%, rgba(255,255,255,.30), transparent 46%),
    linear-gradient(180deg, rgba(255,255,255,.10), rgba(0,0,0,.10));
    mix-blend-mode:soft-light; pointer-events:none;}
  .tile::after{content:""; position:absolute; left:0; right:0; bottom:0; height:62%; pointer-events:none;
    background:linear-gradient(180deg, transparent, rgba(20,18,16,.30));}

  /* BIG 3D icon — top-right, ~45% of tile */
  .tile .ico{position:absolute; top:6px; right:6px; z-index:3; width:48%; aspect-ratio:1; pointer-events:none;
    filter:drop-shadow(0 10px 16px rgba(20,16,12,.34));}
  .tile.hero .ico{width:34%; top:10px; right:10px}
  .tile .ico img{width:100%; height:100%; object-fit:contain}

  .tile .lab{position:absolute; left:15px; right:14px; bottom:13px; z-index:3}
  .tile .lab .kicker{display:block; font-size:9.5px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
    color:rgba(255,255,255,.82); margin-bottom:4px; text-shadow:0 1px 6px rgba(0,0,0,.3)}
  .tile .lab h3{font-size:15.5px; font-weight:700; color:#fff; line-height:1.12; letter-spacing:-.01em;
    text-shadow:0 1px 8px rgba(0,0,0,.34); max-width:13ch}
  .tile.hero .lab{left:18px; bottom:16px}
  .tile.hero .lab h3{font-size:23px; max-width:11ch}
  .tile.hero .lab .sub{display:block; margin-top:5px; font-size:12.5px; font-weight:500; color:rgba(255,255,255,.92); text-shadow:0 1px 6px rgba(0,0,0,.3); max-width:30ch}
  .tile.hero .lab .cta{display:inline-flex; align-items:center; gap:6px; margin-top:11px;
    background:rgba(255,255,255,.94); color:#2c3638; font-weight:700; font-size:12px; padding:8px 14px; border-radius:999px}
  .tile.hero .lab .cta svg{width:13px;height:13px}

  .home-foot{margin:24px 6px 6px; text-align:center; color:var(--muted); font-size:11.5px; line-height:1.5}
  .home-foot b{font-weight:600; color:var(--slate)}

  .tabbar{position:absolute; left:0; right:0; bottom:0; z-index:40; display:grid; grid-template-columns:repeat(3,1fr);
    background:rgba(247,242,236,.9); backdrop-filter:saturate(120%) blur(16px);
    border-top:1px solid var(--line); padding:8px 8px 14px;}
  .tab{border:0; background:transparent; display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:7px 4px 5px; border-radius:13px; color:var(--muted)}
  .tab svg{width:23px;height:23px}
  .tab .lbl{font-size:10.5px; font-weight:600}
  .tab.active{color:var(--ink)}
</style>
</head>
<body>
<div class="stage">
  <div class="app" id="app">
    <header class="appbar">
      <div class="brand">
        <span class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none"><path d="M3 16c2.2 0 2.2-2 4.4-2s2.2 2 4.4 2 2.2-2 4.4-2 2.2 2 4.4 2" stroke="#f0e7df" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3.5l3 5.5H9l3-5.5z" stroke="#f0e7df" stroke-width="1.5" stroke-linejoin="round"/></svg>
        </span>
        <div><div class="name">AVA CONCIERGE</div><div class="sub">Koh Phangan</div></div>
      </div>
      <span class="vbadge">Icons8 · Dark</span>
    </header>
    <main class="scroll">
      <section class="view">
        <div class="greeting">
          <span class="hi"><span class="dot"></span> Welcome to AVA</span>
          <h1>What can we <em>arrange</em><br/>for you today?</h1>
        </div>
        <div class="sec-label"><span class="t">Browse services</span><span class="c">12 services</span></div>
        <div class="tile-grid" id="grid"></div>
        <div class="home-foot">Mockup · <b>Icons8 3D Fluency</b> on App Store-style dark tiles.</div>
      </section>
    </main>
    <nav class="tabbar">
      <button class="tab active" type="button"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3.2 3 10.3V20a1 1 0 0 0 1 1h5v-6h6v6h5a1 1 0 0 0 1-1v-9.7L12 3.2z"/></svg><span class="lbl">Home</span></button>
      <button class="tab" type="button"><svg viewBox="0 0 24 24" fill="none"><path d="M4 5h16v11H8l-4 4V5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M8 10h8M8 13h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span class="lbl">Concierge</span></button>
      <button class="tab" type="button"><svg viewBox="0 0 24 24" fill="none"><path d="M5 7h14M5 12h14M5 17h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span class="lbl">Requests</span></button>
    </nav>
  </div>
</div>
<script>
(function(){
  "use strict";
  var BASE = "icons_icons8_3d/";
  var SERVICES = [
    { id:"bikes", title:"Bikes & Cars", featured:true, kicker:"Most requested",
      sub:"Serviced, insured fleet delivered to your villa door.",
      grad:"linear-gradient(150deg,#3a4147,#2b3137 60%,#21262b)", icon:"bikes.png" },
    { id:"tea",  title:"Tea Ceremony",  grad:"linear-gradient(150deg,#37423e,#2a332f 60%,#202824)", icon:"tea.png" },
    { id:"nanny",title:"Nanny / Babysitter", grad:"linear-gradient(150deg,#453a3d,#352b2e 60%,#282022)", icon:"nanny.png" },
    { id:"ferry",title:"Ferry & Boat Tickets", grad:"linear-gradient(150deg,#3a4047,#2b3137 60%,#21262b)", icon:"ferry.png" },
    { id:"transfer",title:"Transfer & Taxi", grad:"linear-gradient(150deg,#433f37,#33302a 60%,#272520)", icon:"transfer.png" },
    { id:"chef", title:"Private Chef", grad:"linear-gradient(150deg,#443b3a,#342d2c 60%,#272221)", icon:"chef.png" },
    { id:"spa",  title:"Spa & Massage", grad:"linear-gradient(150deg,#384340,#2a3331 60%,#202825)", icon:"spa.png" },
    { id:"tours",title:"Tours & Excursions", grad:"linear-gradient(150deg,#37444a,#293539 60%,#1f292c)", icon:"tours.png" },
    { id:"grocery",title:"Groceries & Delivery", grad:"linear-gradient(150deg,#39434b,#2b333a 60%,#21272c)", icon:"grocery.png" },
    { id:"laundry",title:"Laundry", grad:"linear-gradient(150deg,#43403d,#33302d 60%,#272422)", icon:"laundry.png" },
    { id:"yoga", title:"Yoga & Trainer", grad:"linear-gradient(150deg,#3a4440,#2c3531 60%,#222a26)", icon:"yoga.png" },
    { id:"checkout",title:"Late Checkout", grad:"linear-gradient(150deg,#3a424a,#2c3339 60%,#21272c)", icon:"checkout.png" }
  ];
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
  document.getElementById("grid").innerHTML = SERVICES.map(function(s){
    var img = '<span class="ico"><img alt="" src="'+BASE+s.icon+'" /></span>';
    if(s.featured){
      return '<div class="tile hero" style="background:'+s.grad+'">'+img+
        '<span class="lab"><span class="kicker">'+esc(s.kicker)+'</span><h3>'+esc(s.title)+'</h3>'+
        '<span class="sub">'+esc(s.sub)+'</span>'+
        '<span class="cta">Browse the fleet <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span></div>';
    }
    return '<div class="tile" style="background:'+s.grad+'">'+img+'<span class="lab"><h3>'+esc(s.title)+'</h3></span></div>';
  }).join("");
})();
</script>
</body>
</html>
