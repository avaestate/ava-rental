<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AVA Voice">
<meta name="theme-color" content="#2C3638">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-512.png">
<title>AVA Voice Agent</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Manrope',-apple-system,'Helvetica Neue',Arial,sans-serif;
       background:radial-gradient(120% 120% at 50% 0%, #37444A 0%, #222B2E 60%, #1A2123 100%);
       color:#F4F1EA;display:flex;flex-direction:column;align-items:center;justify-content:space-between;
       min-height:100dvh;padding:calc(env(safe-area-inset-top) + 42px) 24px calc(env(safe-area-inset-bottom) + 34px);text-align:center}
  .top{display:flex;flex-direction:column;align-items:center;gap:8px}
  .brand{font-size:26px;font-weight:800;letter-spacing:.22em;padding-left:.22em}
  .sub{font-size:13px;color:#9DB0B4;font-weight:600;letter-spacing:.02em}
  .orb{width:190px;height:190px;border-radius:50%;margin:8px 0;
       background:radial-gradient(circle at 40% 35%, #A9E9AC, #4FA764 55%, #2f7a48 100%);
       box-shadow:0 0 0 10px rgba(139,226,139,.10), 0 0 60px rgba(79,167,100,.45);
       animation:breathe 4s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1);box-shadow:0 0 0 10px rgba(139,226,139,.10),0 0 60px rgba(79,167,100,.4)}
                     50%{transform:scale(1.05);box-shadow:0 0 0 16px rgba(139,226,139,.14),0 0 80px rgba(79,167,100,.6)}}
  .hint{font-size:14px;color:#C3CDCA;font-weight:600;line-height:1.6;max-width:320px}
  .foot{font-size:11.5px;color:#6E8085;font-weight:600;line-height:1.5}
  elevenlabs-convai{--el-accent:#4FA764}
</style>
</head>
<body>
  <div class="top">
    <div class="brand">AVA</div>
    <div class="sub">Голосовой ассистент</div>
  </div>

  <div class="orb" aria-hidden="true"></div>

  <div class="hint">Нажми кнопку разговора внизу и говори обычным голосом — можно перебивать, отвечаю в реальном времени.</div>

  <div class="foot">Прототип · AVA Voice Agent<br>Для добавления на экран iPhone: «Поделиться» → «На экран Домой»</div>

  <elevenlabs-convai agent-id="agent_0601kxn7f8rqesg8bnwgtrhyjda7"></elevenlabs-convai>
  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
</body>
</html>
