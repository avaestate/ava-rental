<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>AVA · Портал аналитики</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#F0E7DF; --sand-2:#EFE7DB; --paper:#FBF8F2; --card:#FFFFFF;
  --ink:#2B3838; --ink-2:#3C4644; --soft:#6E7672; --faint:#9AA39F;
  --gold:#C6A878; --gold-deep:#B0894F; --gold-soft:#D9C09A;
  --sage:#8F9994; --sage-lt:#ABC4C7; --dark:#2B2016;
  --line:#E4DCCF; --line-2:#EDE6DA;
  --air:#C56B5C; --bkg:#3E6FA0; --dir:#8F9994; --ago:#9B7BB5;
  --pos:#5E8C6A; --neg:#C56B5C;
  --shadow:0 1px 2px rgba(43,32,22,.04), 0 10px 30px rgba(43,32,22,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--sand);color:var(--ink);
  -webkit-font-smoothing:antialiased;line-height:1.5;font-variant-numeric:tabular-nums}
.tnum{font-variant-numeric:tabular-nums}

/* ---- GATE ---- */
#gate{position:fixed;inset:0;background:var(--sand);display:flex;align-items:center;justify-content:center;z-index:50;padding:24px}
.gate-card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);
  padding:38px 34px;max-width:380px;width:100%;text-align:center}
.gate-eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-deep);font-weight:700}
.gate-title{font-size:23px;font-weight:800;margin-top:8px;letter-spacing:-.01em}
.gate-sub{font-size:12.5px;color:var(--soft);margin-top:6px;margin-bottom:22px}
.gate-card input{width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:12px;
  font-family:inherit;font-size:15px;color:var(--ink);background:var(--paper);text-align:center;letter-spacing:.04em}
.gate-card input:focus{outline:none;border-color:var(--gold)}
.gate-card button{width:100%;margin-top:12px;padding:13px;border:none;border-radius:12px;background:var(--ink);
  color:var(--sand);font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:background .15s}
.gate-card button:hover{background:var(--ink-2)}
.gate-err{color:var(--neg);font-size:12.5px;font-weight:600;margin-top:12px;min-height:16px}
.gate-spin{font-size:12.5px;color:var(--soft);margin-top:12px;min-height:16px}

/* ---- APP ---- */
#app{display:none;max-width:1080px;margin:0 auto;padding:30px 22px 64px}
.top{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap;
  border-bottom:1.5px solid var(--ink);padding-bottom:16px}
.eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-deep);font-weight:700}
.h-title{font-size:28px;font-weight:800;letter-spacing:-.01em;line-height:1.06;margin-top:3px}
.h-sub{font-size:12.5px;color:var(--soft);margin-top:3px}
.metabox{text-align:right;font-size:11.5px;color:var(--soft);line-height:1.55}
.metabox b{color:var(--ink);font-weight:700;display:block;font-size:13px}

/* tabs */
.tabs{display:flex;gap:8px;margin:20px 0 4px;flex-wrap:wrap}
.tab{padding:9px 18px;border-radius:30px;border:1.5px solid var(--line);background:var(--card);
  font-family:inherit;font-size:13px;font-weight:700;color:var(--soft);cursor:pointer;transition:all .15s}
.tab:hover{border-color:var(--gold-soft)}
.tab.on{background:var(--ink);color:var(--sand);border-color:var(--ink)}
.panelwrap{display:none}
.panelwrap.on{display:block;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* kpi */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:11px;margin:20px 0 8px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
.kpi .k-l{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);font-weight:700}
.kpi .k-v{font-size:21px;font-weight:800;margin-top:7px;letter-spacing:-.02em;line-height:1}
.kpi .k-d{font-size:10.5px;color:var(--faint);margin-top:5px;font-weight:500}
.kpi.hl .k-v{color:var(--gold-deep)}

.sect{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);font-weight:700;
  margin:28px 0 12px;display:flex;align-items:center;gap:10px}
.sect::after{content:"";flex:1;height:1px;background:var(--line)}

.grid2{display:grid;grid-template-columns:1.35fr 1fr;gap:16px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;box-shadow:var(--shadow)}
.panel h3{font-size:15px;font-weight:800;letter-spacing:-.01em}
.panel .hint{font-size:11.5px;color:var(--faint);margin:3px 0 16px;font-weight:500}
.trend-wrap{width:100%;overflow-x:auto}
svg{display:block;max-width:100%;height:auto}
.axlab{font-size:11px;fill:var(--faint);font-weight:600}
.gridline{stroke:var(--line-2);stroke-width:1}

.vrow{display:grid;grid-template-columns:92px 1fr auto;align-items:center;gap:12px;padding:7px 0;border-bottom:1px dashed var(--line)}
.vrow:last-child{border-bottom:none}
.vname{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vbar-track{height:19px;background:var(--sand-2);border-radius:6px;overflow:hidden}
.vbar-fill{height:100%;background:linear-gradient(90deg,var(--gold-soft),var(--gold-deep));border-radius:6px;transition:width .5s ease}
.vval{font-size:12.5px;font-weight:800;text-align:right;min-width:80px}
.vval small{display:block;font-size:10px;color:var(--faint);font-weight:600}

.donut-flex{display:flex;flex-direction:column;align-items:center;gap:16px}
.legend{width:100%;display:flex;flex-direction:column;gap:10px}
.leg{display:flex;align-items:center;gap:10px;font-size:13px}
.dot{width:11px;height:11px;border-radius:3px;flex:none}
.leg .ln{font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.leg .lv{font-weight:800;white-space:nowrap}
.leg .lp{color:var(--soft);font-weight:700;font-size:12px;min-width:44px;text-align:right}

.adr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.adr-cell{border:1px solid var(--line);border-radius:11px;padding:11px 13px;background:var(--card)}
.adr-cell .an{font-size:11.5px;font-weight:700;color:var(--soft)}
.adr-cell .av{font-size:17px;font-weight:800;margin-top:2px}
.adr-cell .av small{font-size:11px;color:var(--faint);font-weight:600}

/* owner table */
.otable{width:100%;border-collapse:collapse;font-size:13px;overflow:hidden;border-radius:14px}
.owrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);background:var(--card)}
.otable th{background:var(--sand-2);color:var(--soft);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  font-weight:700;padding:12px 14px;text-align:right;white-space:nowrap}
.otable th:first-child{text-align:left}
.otable td{padding:12px 14px;text-align:right;border-top:1px solid var(--line-2);font-weight:600;white-space:nowrap}
.otable td:first-child{text-align:left;font-weight:800}
.otable tr.idle td{color:var(--faint);font-weight:500}
.otable td.own{font-weight:800;color:var(--ink)}
.otable td.neg{color:var(--neg)}
.otable tr.tot td{border-top:2px solid var(--ink);background:var(--sand-2);font-weight:800;font-size:13.5px}
.badge{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 8px;border-radius:20px;background:var(--sand-2);color:var(--soft)}
.formula-box{background:var(--dark);color:var(--sand);border-radius:14px;padding:16px 20px;margin-bottom:16px}
.formula-box .fl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;opacity:.6;font-weight:700}
.formula-box .fv{font-size:16px;font-weight:800;margin-top:6px;color:var(--gold-soft)}
.notebox{background:var(--sand-2);border:1px solid var(--line);border-radius:12px;padding:13px 16px;
  font-size:11.5px;color:var(--soft);line-height:1.55;margin-top:14px}
.notebox b{color:var(--ink)}
.foot{margin-top:26px;padding-top:14px;border-top:1px solid var(--line);display:flex;justify-content:space-between;
  gap:12px;flex-wrap:wrap;font-size:10.5px;color:var(--faint)}

@media(max-width:860px){
  .kpis{grid-template-columns:repeat(3,1fr)} .grid2{grid-template-columns:1fr}
  .adr-grid{grid-template-columns:repeat(2,1fr)} .h-title{font-size:23px}
}
@media(max-width:520px){ .kpis{grid-template-columns:repeat(2,1fr)} .adr-grid{grid-template-columns:1fr} }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <div class="gate-eyebrow">AVA Estate · inVil</div>
    <div class="gate-title">Портал аналитики</div>
    <div class="gate-sub">Закрытый доступ. Введите пароль для просмотра данных портфеля.</div>
    <form id="gateForm" autocomplete="off">
      <input id="pw" type="password" placeholder="Пароль" autocomplete="off" autofocus>
      <button type="submit">Войти</button>
    </form>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<div id="app">
  <div class="top">
    <div>
      <div class="eyebrow">AVA Estate · inVil Portfolio</div>
      <div class="h-title">Портал аналитики</div>
      <div class="h-sub" id="hsub">Ko Pha-ngan · Guesty Open API</div>
    </div>
    <div class="metabox"><b id="metadate">—</b><span id="metacount"></span></div>
  </div>

  <div class="tabs">
    <button class="tab on" data-tab="analytics">Аналитика портфеля</button>
    <button class="tab" data-tab="owner">Выплаты собственникам · Июнь</button>
  </div>

  <div class="panelwrap on" id="pw-analytics"></div>
  <div class="panelwrap" id="pw-owner"></div>

  <div class="foot">
    <span id="foot-src">Источник: Guesty Open API · confirmed + checked_out</span>
    <span>AVA Estate · собственная аналитика</span>
  </div>
</div>

const money=n=>"฿"+Math.round(n).toLocaleString("ru-RU");
const short=n=>Math.abs(n)>=1e6?(n/1e6).toFixed(2)+"M":Math.round(n/1000)+"k";

/* ---- decrypt gate ---- */
async function unlock(password){
  const dec=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
  const te=new TextEncoder();
  const baseKey=await crypto.subtle.importKey('raw',te.encode(password),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:dec(ENC.salt),iterations:150000,hash:'SHA-256'},
    baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(ENC.iv)},key,dec(ENC.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
$('#gateForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const err=$('#gateErr'); err.textContent='Проверяю…'; err.style.color='var(--soft)';
  try{
    const data=await unlock($('#pw').value);
    $('#gate').style.display='none'; $('#app').style.display='block';
    render(data);
  }catch(_){ err.style.color='var(--neg)'; err.textContent='Неверный пароль'; $('#pw').select(); }
});

/* ---- tabs ---- */
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.panelwrap').forEach(x=>x.classList.remove('on'));
  t.classList.add('on'); $('#pw-'+t.dataset.tab).classList.add('on');
}));

/* ---- render ---- */
function render(D){
  $('#metadate').textContent=D.generated;
  const a=D.analytics;
  $('#metacount').innerHTML=a.tot.bk+" подтверждённых броней<br>10 вилл в управлении";
  $('#hsub').textContent="Ko Pha-ngan · заезды окт 2025 — дек 2026 · Guesty Open API";
  renderAnalytics(a);
  renderOwner(D.owner);
}

function renderAnalytics(a){
  const t=a.tot;
  const kpis=[
    {l:"Выручка периода",v:money(t.rev),d:"после комиссий площадок",hl:1},
    {l:"Продано ночей",v:t.nights.toLocaleString("ru-RU"),d:"по портфелю"},
    {l:"Средний ADR",v:money(t.adr),d:"ставка за ночь"},
    {l:"Будущий pipeline",v:money(t.future),d:"забронировано вперёд",hl:1},
    {l:"Броней",v:t.bk,d:"подтверждённых"},
    {l:"Вилл с доходом",v:t.villas,d:"+ Four Moons"},
  ];
  let html=`<div class="kpis">`+kpis.map(i=>`<div class="kpi ${i.hl?'hl':''}"><div class="k-l">${i.l}</div><div class="k-v">${i.v}</div><div class="k-d">${i.d}</div></div>`).join('')+`</div>`;
  html+=`<div class="sect">Динамика по месяцам · 2026</div>
    <div class="panel"><h3>Выручка и загрузка</h3>
    <p class="hint">Столбцы — выручка (host payout). Линия — загрузка по активным виллам. Сезон Пангана: пик янв–фев, провал май–июнь.</p>
    <div class="trend-wrap"><svg id="trend" viewBox="0 0 760 300"></svg></div></div>`;
  html+=`<div class="sect">Разрез портфеля</div>
    <div class="grid2">
      <div class="panel"><h3>Выручка по виллам</h3><p class="hint">За весь период. Справа — законтрактовано вперёд.</p><div id="villas"></div></div>
      <div class="panel"><h3>Каналы продаж</h3><p class="hint">Доля выручки по источникам.</p>
        <div class="donut-flex"><svg id="donut" viewBox="0 0 180 180" width="180" height="180"></svg><div class="legend" id="legend"></div></div></div>
    </div>`;
  html+=`<div class="sect">ADR · топ вилл</div><div class="adr-grid" id="adr"></div>`;
  $('#pw-analytics').innerHTML=html;
  drawTrend(a.trend); drawVillas(a.villas); drawDonut(a.channels); drawADR(a.villas);
}

function drawTrend(t){
  const W=760,H=300,padL=52,padR=40,padT=18,padB=42;
  const maxRev=Math.max(...t.map(m=>m.rev)); const plotW=W-padL-padR,plotH=H-padT-padB;
  const n=t.length,step=plotW/n,bw=step*0.56;
  const x=i=>padL+step*i+step/2, yR=v=>padT+plotH-(v/maxRev)*plotH, yL=v=>padT+plotH-(v/100)*plotH;
  let s=`<defs><linearGradient id="gg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--gold-deep)"/><stop offset="1" stop-color="var(--gold-soft)"/></linearGradient></defs>`;
  for(let g=0;g<=4;g++){const val=maxRev*g/4,yy=yR(val);
    s+=`<line class="gridline" x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}"/>`;
    s+=`<text class="axlab" x="${padL-8}" y="${(yy+4).toFixed(1)}" text-anchor="end">${short(val)}</text>`;}
  [0,50,100].forEach(p=>{s+=`<text class="axlab" x="${W-padR+8}" y="${(yL(p)+4).toFixed(1)}" text-anchor="start" style="fill:var(--gold-deep)">${p}%</text>`;});
  t.forEach((m,i)=>{const bx=x(i)-bw/2,by=yR(m.rev),bh=padT+plotH-by;
    s+=`<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(bh,1).toFixed(1)}" rx="4" fill="url(#gg)"/>`;
    s+=`<text class="axlab" x="${x(i).toFixed(1)}" y="${H-padB+18}" text-anchor="middle">${m.m.slice(5)}</text>`;});
  s+=`<polyline points="${t.map((m,i)=>x(i).toFixed(1)+','+yL(m.load).toFixed(1)).join(' ')}" fill="none" stroke="var(--sage)" stroke-width="2.4" stroke-linejoin="round"/>`;
  t.forEach((m,i)=>{s+=`<circle cx="${x(i).toFixed(1)}" cy="${yL(m.load).toFixed(1)}" r="3.2" fill="var(--card)" stroke="var(--sage)" stroke-width="2"/>`;});
  $('#trend').innerHTML=s;
}
function drawVillas(vs){
  vs=vs.filter(v=>v.rev>10000); const max=Math.max(...vs.map(v=>v.rev));
  $('#villas').innerHTML=vs.map(v=>{const w=(v.rev/max*100).toFixed(1);
    const fut=v.future>0?`<small>+${short(v.future)} вперёд</small>`:`<small>&nbsp;</small>`;
    return `<div class="vrow"><div class="vname">${v.name.trim()}</div><div class="vbar-track"><div class="vbar-fill" style="width:${w}%"></div></div><div class="vval">${money(v.rev)}${fut}</div></div>`;}).join('');
}
function drawDonut(ch){
  const total=ch.reduce((a,c)=>a+c.rev,0);
  const col={"Airbnb":"var(--air)","Booking.com":"var(--bkg)","Direct / Manual":"var(--dir)","Agoda":"var(--ago)"};
  const cx=90,cy=90,r=64,sw=26,C=2*Math.PI*r; let off=0;
  let s=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--sand-2)" stroke-width="${sw}"/>`;
  ch.forEach(c=>{const len=c.rev/total*C;
    s+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col[c.name]||'var(--gold)'}" stroke-width="${sw}" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=len;});
  s+=`<text x="${cx}" y="${cy-4}" text-anchor="middle" style="font-size:20px;font-weight:800;fill:var(--ink)">${short(total)}</text>`;
  s+=`<text x="${cx}" y="${cy+14}" text-anchor="middle" style="font-size:10px;font-weight:700;fill:var(--soft);letter-spacing:.08em">฿ ВЫРУЧКА</text>`;
  $('#donut').innerHTML=s;
  $('#legend').innerHTML=ch.map(c=>{const p=(c.rev/total*100).toFixed(1);
    return `<div class="leg"><span class="dot" style="background:${col[c.name]||'var(--gold)'}"></span><span class="ln">${c.name}</span><span class="lv">${money(c.rev)}</span><span class="lp">${p}%</span></div>`;}).join('');
}
function drawADR(vs){
  vs=vs.filter(v=>v.rev>10000).sort((a,b)=>b.adr-a.adr).slice(0,6);
  $('#adr').innerHTML=vs.map(v=>`<div class="adr-cell"><div class="an">${v.name.trim()}</div><div class="av">${money(v.adr)} <small>/ ночь · ${v.nights} ноч.</small></div></div>`).join('');
}

function renderOwner(o){
  let html=`<div class="formula-box"><div class="fl">Формула выплаты · ${o.month}</div><div class="fv">${o.formula}</div></div>`;
  html+=`<div class="owrap"><table class="otable"><thead><tr>
    <th>Вилла</th><th>Выручка</th><th>Свет</th><th>Интернет</th><th>База</th><th>Собственнику 75%</th><th>Компании 25%</th></tr></thead><tbody>`;
  o.villas.forEach(v=>{
    if(v.idle){ html+=`<tr class="idle"><td>${v.name.trim()}</td><td colspan="6" style="text-align:left"><span class="badge">нет заездов в июне</span></td></tr>`; return; }
    const negc=v.owner<0?'neg':'';
    html+=`<tr><td>${v.name.trim()}</td><td>${money(v.rev)}</td><td>−${money(v.elec)}</td><td>−${money(v.internet)}</td><td>${money(v.base)}</td><td class="own ${negc}">${money(v.owner)}</td><td>${money(v.company)}</td></tr>`;
  });
  html+=`<tr class="tot"><td>ИТОГО</td><td>${money(o.tot_rev)}</td><td colspan="3"></td><td>${money(o.tot_owner)}</td><td>${money(o.tot_company)}</td></tr>`;
  html+=`</tbody></table></div>`;
  html+=`<div class="notebox"><b>Примечание.</b> ${o.note} «Выручка» — host payout из Guesty (после комиссий площадок). Финальные суммы фиксируются после снятия июньских счётчиков электричества.</div>`;
  $('#pw-owner').innerHTML=html;
}
