<style>
  :root{ --cream:#efe6db; --cream2:#f4ede3; --ink:#2b3838; --ink2:#333f3e;
         --sub:#9aa39f; --muted:#6f7a76; --hair:#ddd2c3; --gold:#c6a878; --gold2:#d9c09a;
         --green:#7fa06f; --card-cream:#f2ebe1; }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
  html,body{ background:#ded7ca; }
  body{ font-family:'Manrope',system-ui,sans-serif; color:var(--ink); }
  #app{ max-width:480px; margin:0 auto; background:var(--cream); min-height:100vh;
        box-shadow:0 0 60px rgba(30,36,35,.15); overflow:hidden; }
  a,button{ font-family:inherit; }
  header{ display:flex; align-items:center; justify-content:space-between; padding:20px 22px 6px;
          position:sticky; top:0; background:var(--cream); z-index:20; }
  .logo{ font-weight:800; font-size:28px; letter-spacing:1px; cursor:pointer; }
  .icons{ display:flex; gap:9px; }
  .ic{ width:42px; height:42px; border-radius:50%; background:#55635f; display:flex;
       align-items:center; justify-content:center; color:#eee; font-size:16px; }
  .ic.dark{ background:#2b3838; }
  .back{ background:none; border:none; color:#2b3838; font-weight:700; font-size:15px;
         display:flex; align-items:center; gap:8px; cursor:pointer; padding:6px 0; }
  .back .r{ width:34px; height:34px; border-radius:50%; background:#e4dccf; display:flex;
            align-items:center; justify-content:center; font-size:15px; }
  .lead{ padding:12px 22px 4px; }
  .lead h2{ font-size:22px; font-weight:800; letter-spacing:-.3px; }
  .lead p{ font-size:13.5px; color:var(--muted); margin-top:6px; line-height:1.45; }

  .card{ background:#2c3638; color:#f0e7df; border-radius:24px;
         margin:16px 18px 0; padding:13px; cursor:pointer; transition:transform .18s ease;
         animation:rise .5s ease both; }
  .card:active{ transform:scale(.985) }
  @keyframes rise{ from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none} }
  .photo{ position:relative; border-radius:16px; overflow:hidden; aspect-ratio:16/11;
          background:linear-gradient(135deg,#3a4a44,#2b3838); }
  .photo img{ width:100%; height:100%; object-fit:cover; display:block; }
  .pill{ position:absolute; top:13px; left:13px; background:#efe7db; color:#2b3838;
         font-weight:800; font-size:12px; letter-spacing:.6px; padding:7px 14px; border-radius:40px; }
  .cbody{ padding:15px 6px 4px; }
  .cname{ font-size:22px; font-weight:800; letter-spacing:-.3px; }
  .csub{ font-size:14px; color:var(--sub); margin-top:7px; line-height:1.45; }
  .cprice{ font-size:25px; font-weight:800; margin-top:14px; letter-spacing:-.5px; }
  .cprice span{ font-size:15px; color:var(--sub); font-weight:600; }
  .invblock{ background:#3F4A4C; border-radius:10px; margin-top:20px; overflow:hidden; }
  .strip{ display:grid; grid-template-columns:1fr 1fr 1fr; }
  .m{ padding:13px 14px; display:flex; flex-direction:column; align-items:flex-start; justify-content:center; text-align:left; }
  .m + .m{ border-left:1px solid rgba(255,255,255,.09); }
  .m .l{ font-size:12px; line-height:1; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:#9db0b4; }
  .m .v{ font-size:20px; font-weight:600; margin-top:6px; letter-spacing:0; font-variant-numeric:tabular-nums; color:#f0e7df; }
  .m .v .u{ font-size:12px; color:#f0e7df; font-weight:600; }
  .m .v small{ font-size:12px; color:#f0e7df; font-weight:700; opacity:.85; }
  .sparkpanel{ padding:10px 14px; border-top:1px solid rgba(255,255,255,.09); }
  .sparkpanel svg{ width:100%; height:44px; margin-top:6px; overflow:visible; }
  .trend{ font-size:12px; font-weight:800; color:#90e480; white-space:nowrap; text-align:right; }
  .more{ margin-top:14px; width:100%; border:none; cursor:pointer; background:#efe7db; color:#2b3838;
         font-weight:800; font-size:15px; padding:14px; border-radius:40px; display:flex;
         align-items:center; justify-content:center; gap:9px; }
  .more .arr{ width:25px; height:25px; border-radius:50%; background:#2b3838; color:#efe7db;
              display:flex; align-items:center; justify-content:center; font-size:13px; }
  .foot{ height:26px; }
  .disc{ text-align:center; font-size:11px; color:#9a938a; padding:4px 30px 24px; line-height:1.5; }

  .dhero{ position:relative; margin:6px 18px 0; border-radius:20px; overflow:hidden; aspect-ratio:16/10; background:#2b3838; }
  .dhero img{ width:100%; height:100%; object-fit:cover; display:block; }
  .dhero .pill{ top:14px; left:14px; }
  .gal{ display:flex; gap:7px; margin:9px 18px 0; }
  .gal img{ width:100%; height:56px; object-fit:cover; border-radius:9px; opacity:.9; }
  .dpad{ padding:18px 22px; }
  h1{ font-size:27px; font-weight:800; line-height:1.14; letter-spacing:-.3px; }
  .dprice{ font-size:28px; font-weight:800; margin-top:10px; letter-spacing:-.5px; }
  .dprice span{ font-size:15px; color:var(--muted); font-weight:600; }
  .badges{ display:flex; gap:7px; flex-wrap:wrap; margin-top:13px; }
  .tag{ font-size:11.5px; font-weight:700; letter-spacing:.3px; padding:6px 12px; border-radius:40px; background:#e4dccf; color:#4b5551; }
  .tag.sale{ background:#2b3838; color:#f2ebe1; }
  p.ddesc{ font-size:16px; line-height:1.5; color:#3c4644; margin-top:16px; }
  .kv{ font-size:15px; line-height:1.7; margin-top:14px; color:#3c4644; }
  .kv b{ color:#2b3838; } .kv a{ color:#7d8a86; text-decoration:underline; text-underline-offset:3px; }
  .specs{ display:flex; flex-wrap:wrap; gap:6px 16px; margin-top:14px; font-size:14.5px; color:#3c4644; }
  .specs b{ color:#2b3838; }
  .feat{ font-size:15px; line-height:1.65; color:#3c4644; margin-top:14px; }
  .own{ margin-top:14px; font-size:15px; line-height:1.7; } .own b{ color:#2b3838; }
  .hr{ height:1px; background:var(--hair); margin:22px 0 0; }

  .invest{ background:var(--ink); color:var(--card-cream); border-radius:24px; margin:20px 18px 22px; padding:22px 20px 24px; }
  .itop{ display:flex; align-items:center; justify-content:space-between; }
  .kicker{ font-size:12.5px; font-weight:800; letter-spacing:1.3px; text-transform:uppercase; color:#cdd4d0; }
  .live{ display:flex; align-items:center; gap:6px; font-size:11px; font-weight:700; color:#a9b2ad; }
  .dot{ width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2.2s infinite; }
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(127,160,111,.55)}70%{box-shadow:0 0 0 9px rgba(127,160,111,0)}100%{box-shadow:0 0 0 0 rgba(127,160,111,0)}}
  .kpis{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:9px; margin-top:18px; }
  .kpi{ background:var(--ink2); border-radius:16px; padding:14px 11px; }
  .kpi .lab{ font-size:10.5px; font-weight:700; letter-spacing:.3px; color:#939d98; text-transform:uppercase; line-height:1.25; min-height:26px; }
  .kpi .num{ font-size:22px; font-weight:800; margin-top:7px; letter-spacing:-.5px; font-variant-numeric:tabular-nums; }
  .kpi .num .u{ font-size:13px; font-weight:700; color:var(--gold); }
  .kpi .num small{ font-size:12px; font-weight:700; color:#c9d1cc; }
  .yhint{ font-size:11px; color:#8f9994; margin-top:12px; line-height:1.45; }
  .subrow{ display:flex; justify-content:space-between; gap:8px; margin-top:14px; font-size:12.5px; color:#aab3ae; }
  .subrow b{ color:#e6ded2; font-weight:700; }
  .ctitle{ font-size:12.5px; font-weight:700; color:#c3ccc6; margin:20px 0 12px; display:flex; justify-content:space-between; }
  .ctitle .hi{ color:var(--gold2); }
  svg{ display:block; width:100% }
  .cum{ background:var(--ink2); border-radius:16px; padding:16px; margin-top:20px; }
  .cum .r1{ display:flex; justify-content:space-between; align-items:baseline; }
  .cum .big{ font-size:22px; font-weight:800; letter-spacing:-.4px; }
  .cum .lab2{ font-size:11px; color:#9aa39f; font-weight:600; margin-bottom:3px; }
  .cum .pct{ font-size:13px; font-weight:800; color:var(--green); }
  .barw{ height:9px; border-radius:6px; background:#28312f; margin-top:12px; overflow:hidden; }
  .barf{ height:100%; border-radius:6px; background:linear-gradient(90deg,#c6a878,#d9c09a); transition:width 1s ease; }
  .cum .cap{ font-size:11px; color:#8f9994; margin-top:9px; line-height:1.45; }
  .cta{ margin-top:20px; width:100%; border:none; cursor:pointer; background:var(--gold); color:#2b2016;
        font-weight:800; font-size:16px; padding:16px; border-radius:40px; display:flex;
        align-items:center; justify-content:center; gap:10px; }
  .cta .arr{ width:26px; height:26px; border-radius:50%; background:#2b2016; color:var(--gold); display:flex; align-items:center; justify-content:center; font-size:14px; }
  .note{ font-size:10.5px; color:#8f9994; margin-top:13px; line-height:1.5; text-align:center; }
@media(max-width:640px){ .m .v{ font-size:18px } .m .l{ font-size:9px } }

let VILLAS = PAYLOAD.villas;
const money = n => Math.round(n).toLocaleString('en-US');
const kfmt = n => n>=1e6 ? (n/1e6).toFixed(n>=1e7?0:2)+'M' : (n>=1000 ? Math.round(n/1000)+'k' : Math.round(n));
const bySlug = s => VILLAS.find(v=>v.id===s);

/* ---- charts from REAL series ---- */
function sparkSVG(series){
  const v=series.slice(); const W=200,H=30,n=v.length,mx=Math.max(...v,1),mn=Math.min(...v);
  const PAD=4;
  const xs=i=>PAD+i*((W-2*PAD)/(n-1)), ys=val=>H-4-((val-mn)/((mx-mn)||1))*(H-9);
  let d=`M${PAD} ${ys(v[0]).toFixed(1)}`;
  for(let i=1;i<n;i++) d+=` L${xs(i).toFixed(1)} ${ys(v[i]).toFixed(1)}`;
  const area=d+` L${W-PAD} ${H} L${PAD} ${H} Z`;
  return `<defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
     <stop offset="0" stop-color="#abc4c7" stop-opacity=".35"/>
     <stop offset="1" stop-color="#abc4c7" stop-opacity="0"/></linearGradient></defs>
     <path d="${area}" fill="url(#sg)"/><path d="${d}" fill="none" stroke="#abc4c7" stroke-width="1" vector-effect="non-scaling-stroke"/>
     <circle cx="${W-PAD}" cy="${ys(v[n-1]).toFixed(1)}" r="0.1" fill="none" stroke="#dcebec" stroke-width="4.6" stroke-linecap="round" vector-effect="non-scaling-stroke"/>`;
}
function barsSVG(series,labels){
  const vals=series.slice(); const W=400,H=168,n=vals.length,gap=7,bw=(W-gap*(n-1))/n;
  const floor=H-24, top=22, mx=Math.max(...vals,1);
  let s=`<line x1="0" y1="${floor}" x2="${W}" y2="${floor}" stroke="#4a5553"/>`;
  vals.forEach((val,i)=>{
    const h=val>0 ? Math.max(3,(val/mx)*(floor-top)) : 0;
    const x=i*(bw+gap), y=floor-h, hot=val>=mx*0.85;
    if(h>0){
      s+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="3" fill="${hot?'#d9c09a':'#c6a878'}" opacity="${hot?1:.85}"/>`;
      s+=`<text x="${(x+bw/2).toFixed(1)}" y="${(y-5).toFixed(1)}" fill="#e6ded2" font-size="9" font-weight="700" text-anchor="middle" font-family="Manrope">${kfmt(val)}</text>`;
    }
    s+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-8}" fill="#8b948f" font-size="9" text-anchor="middle" font-family="Manrope">${labels[i]||''}</text>`;
  });
  return s;
}
/* count-up animation */
function countUp(el, target, fmt){
  if(!el) return; const dur=900, t0=performance.now();
  function step(t){ const p=Math.min(1,(t-t0)/dur); const e=1-Math.pow(1-p,3);
    el.textContent=fmt(target*e); if(p<1) requestAnimationFrame(step); }
  requestAnimationFrame(step);
}

/* ---------- CATALOG ---------- */
function catalog(){
  let cards = VILLAS.map((v,i)=>`
    <div class="card" onclick="go('${v.id}')" style="animation-delay:${i*70}ms">
      <div class="photo"><img src="${v.hero}" alt="" loading="lazy"><div class="pill">FOR SALE</div></div>
      <div class="cbody">

        <div class="csub">${v.city} · fully furnished, rental-ready. Verified performance on Airbnb &amp; Booking.</div>
        <div class="cprice">${money(v.price)} <span>฿</span></div>
        <div class="invblock"><div class="strip">
          <div class="m"><div class="l">In operation</div><div class="v">${v.months} <small>mo</small></div></div>
          <div class="m"><div class="l">Net / month</div><div class="v"><span class="u">฿</span>${kfmt(v.net)}</div></div>
          <div class="m"><div class="l">ROI / year</div><div class="v">${v.yld}<span class="u">%</span></div></div>
        </div>
        <div class="sparkpanel"><div class="trend">▲ ฿${(v.cum/1e6).toFixed(2)}M earned</div>
          <svg viewBox="0 0 200 30" preserveAspectRatio="none">${sparkSVG(v.series)}</svg></div></div>
        <button class="more" onclick="event.stopPropagation();go('${v.id}')">More Info <span class="arr">→</span></button>
      </div>
    </div>`).join('');
  return `
    <header><div class="logo" onclick="go('')">ΛVΛ</div>
      <div class="icons"><div class="ic">✆</div><div class="ic">✈</div><div class="ic dark">≡</div></div></header>
    <div class="lead"><h2>Investment villas · Koh Phangan</h2>
      <p>Turnkey, rental-ready homes with verified returns. Tap any villa for its full performance.</p></div>
    ${cards}
    <div class="disc">Live figures from actual Guesty booking data, refreshed daily. Full report available on request.</div>`;
}

      <div class="feat">${v.bd} bedrooms · ${feats.join(' · ')}</div>

    </div>
    <div class="hr"></div>
    <div class="invest">
      <div class="itop"><div class="kicker">Investment performance</div>
        <div class="live"><span class="dot"></span> Live · updated daily</div></div>
      <div class="kpis">
        <div class="kpi"><div class="lab">In operation</div><div class="num">${v.months} <small>mo</small></div></div>
        <div class="kpi"><div class="lab">Net profit / mo</div><div class="num"><span class="u">฿</span><span id="d-net">0</span></div></div>
        <div class="kpi"><div class="lab">ROI / year</div><div class="num"><span id="d-yld">0</span><span class="u">%</span></div></div>
      </div>
      <div class="yhint">ROI / year = yearly profit ÷ villa price. ~${Math.round(v.yld)}%/yr is strong for villas here — full payback in ≈ ${Math.max(1,Math.round(100/v.yld))} years, then pure income, and the villa itself stays yours (and keeps gaining value).</div>

      <div class="ctitle">Net monthly profit, ฿ <span class="hi">last 12 months</span></div>
      <svg id="d-bars" viewBox="0 0 400 168" preserveAspectRatio="none">${barsSVG(v.series,v.labels)}</svg>
      <div class="cum">
        <div class="r1"><div><div class="lab2">Earned since launch</div><div class="big">฿<span id="d-cum">0</span></div></div>
          <div class="pct">${recovered}% of price back</div></div>
        <div class="barw"><div class="barf" id="d-bar" style="width:0%"></div></div>
        <div class="cap">Of the ${money(v.price)} ฿ price, ฿${money(v.cum)} has already come back as profit since the villa opened.</div>
      </div>
      <button class="cta">Request full report <span class="arr">→</span></button>
      <div class="note">Live figures from actual Guesty booking data, refreshed daily.</div>
    </div>
    <div class="foot"></div>`;
}

/* ---------- ROUTER ---------- */
function render(){
  const slug=location.hash.replace(/^#\/?v?\/?/,'').replace('#','');
  const app=document.getElementById('app'); window.scrollTo(0,0);
  if(slug && bySlug(slug)){
    const v=bySlug(slug); app.innerHTML=detail(v);
    countUp(document.getElementById('d-net'), v.net, x=>kfmt(x));
    countUp(document.getElementById('d-yld'), v.yld, x=>x.toFixed(1));
    countUp(document.getElementById('d-cum'), v.cum, x=>money(x));
    setTimeout(()=>{const b=document.getElementById('d-bar'); if(b)b.style.width=Math.min(100,Math.round(v.cum/v.price*100))+'%';},60);
  } else { app.innerHTML=catalog(); }
}
function go(slug){ location.hash = slug ? ('#/v/'+slug) : '#'; }
window.addEventListener('hashchange', render);

async function boot(){
  try{
    const r=await fetch('data.json?_='+Date.now(),{cache:'no-store'});
    if(r.ok){ const j=await r.json(); if(j && j.villas && j.villas.length){ PAYLOAD=j; VILLAS=j.villas; } }
  }catch(e){}
  render();
}
boot();
